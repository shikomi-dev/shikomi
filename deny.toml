[advisories]
# メンテナンス停止・yanked な crate は即座にビルドを失敗させる（Fail Fast）
# vulnerability: cargo-deny 0.19.x で deprecated となり省略可能（常時有効・deny相当で動作する）
# unmaintained: "all"=全依存, "workspace"=直接依存のみ, "transitive"=間接のみ, "none"=無効
unmaintained = "all"
yanked = "deny"
# 一時例外: ignore リストに個別登録し、PR インラインコメントで解除 Issue 番号必須
# 初期状態は空（外部 crate 未導入のため）
# NOTE: 以下の暗号クリティカル crate は ignore への登録を禁止する
# aes-gcm / argon2 / zeroize / secrecy / hkdf / pbkdf2 / bip39 / rand_core / subtle
ignore = []

[licenses]
# MIT / Apache-2.0 / ISC / BSD 系のみ許可
# confidence-threshold: ライセンス検出精度の下限（0.93 未満は unknown 扱いで deny）
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    # hashlink 0.9.x（rusqlite 0.31 の依存）が MPL-2.0 ライセンス。
    # Issue #10 で導入した rusqlite による一時例外。rusqlite バージョン更新時に再評価すること。
    "MPL-2.0",
]

[bans]
# 複数バージョン共存は依存解決の複雑化を招く（Fail Fast）
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
# 一時例外: skip リストに個別登録し、PR インラインコメントで解除 Issue 番号必須
# 初期状態は空（外部 crate 未導入のため）
# NOTE: 以下の暗号クリティカル crate は skip / skip-tree への登録を禁止する
# aes-gcm / argon2 / zeroize / secrecy / hkdf / pbkdf2 / bip39 / rand_core / subtle
skip = [
    # wit-bindgen 0.51.0 / 0.57.1 が getrandom v0.4 → uuid v1 の間接依存で共存する。
    # Issue #7 で導入した uuid/getrandom による一時例外。
    # uuid のバージョン更新時に再評価すること。
    { name = "wit-bindgen", version = "0.51.0" },
    { name = "wit-bindgen", version = "0.57.1" },
    # rusqlite 0.31 が hashbrown 0.14.x に依存し、他の依存が 0.15.x / 0.17.x を使う場合に共存する。
    # Issue #10 で導入した rusqlite による一時例外。rusqlite バージョン更新時に再評価すること。
    { name = "hashbrown", version = "0.14" },
    { name = "hashbrown", version = "0.15" },
    { name = "hashbrown", version = "0.17" },
    # thiserror 1.x は一部の間接依存が旧バージョンを使用する。ワークスペースは 2.x を採用。
    # Issue #10 で顕在化。各依存クレートのバージョン更新時に再評価すること。
    { name = "thiserror", version = "1" },
    { name = "thiserror-impl", version = "1" },
    # windows-sys / windows-targets / windows_* は各クレートが異なるバージョンを要求するため共存する。
    # fs4 0.9 / dirs 5 / rusqlite 0.31 の依存チェーンによる。Issue #10 で導入。
    { name = "windows-sys", version = "0.48" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-sys", version = "0.59" },
    { name = "windows-targets", version = "0.48" },
    { name = "windows_aarch64_gnullvm", version = "0.48" },
    { name = "windows_aarch64_msvc", version = "0.48" },
    { name = "windows_i686_gnu", version = "0.48" },
    { name = "windows_i686_msvc", version = "0.48" },
    { name = "windows_x86_64_gnu", version = "0.48" },
    { name = "windows_x86_64_gnullvm", version = "0.48" },
    { name = "windows_x86_64_msvc", version = "0.48" },
    # rustix / linux-raw-sys は fs4 0.9 が新旧両バージョンを間接依存として持つ。
    # Issue #10 で導入した fs4 による一時例外。fs4 バージョン更新時に再評価すること。
    { name = "rustix", version = "0.38" },
    { name = "linux-raw-sys", version = "0.4" },
    # getrandom 0.2.x は uuid 1.x の依存。0.4.x は wit-bindgen 経由の新規依存。
    # Issue #7/#10 で導入。バージョン更新時に再評価すること。
    { name = "getrandom", version = "0.2" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
