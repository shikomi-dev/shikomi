[workspace]
resolver = "2"
members = [
    "crates/shikomi-core",
    "crates/shikomi-infra",
    "crates/shikomi-gui",
    "crates/shikomi-daemon",
    "crates/shikomi-cli",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["shikomi-dev"]
license = "MIT"
repository = "https://github.com/shikomi-dev/shikomi"
# MSRV: `.clippy.toml` の msrv と同値。`rust-toolchain.toml` は開発時チャンネル(stable)指定のみで、MSRV管理は本フィールドと `.clippy.toml` で一元化
rust-version = "1.80.0"
publish = false

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
