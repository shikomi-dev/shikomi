name: 機能要望
description: 新機能の提案や改善要望
title: "feat: [機能の概要を簡潔に記述]"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな問題・不便さを解決したいですか？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更があれば課題が解決されますか？
    validations:
      required: true

  - type: dropdown
    id: persona
    attributes:
      label: 主な対象ペルソナ
      description: この機能が最も役立つユーザー層（context/overview.md §3 参照）
      options:
        - ペルソナ A — 田中俊介（非技術者・SaaS営業・定型文多用）
        - ペルソナ B — 山田美咲（フロントエンドエンジニア・マルチOS利用者）
        - ペルソナ C — 佐々木健二（総務担当・技術非習熟・SmartScreen懸念）
        - 全ペルソナ共通

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他にどのような解決策を検討しましたか？（任意）
