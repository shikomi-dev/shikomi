name: Test Daemon

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-daemon:
    # Issue #75 Bug-F-003 解消: cli-vault-commands/test-design/ci.md §7.2.2 SSoT 通り
    # 3-OS マトリクスで `cargo test -p shikomi-daemon -p shikomi-cli` を必須化。
    # IPC socket 競合は justfile レシピ側で `--no-fail-fast` + `serial_test` 直列化により
    # 局所吸収する設計。
    name: test-daemon
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install just
        run: cargo install --locked just

      - name: just test-daemon
        run: just test-daemon
