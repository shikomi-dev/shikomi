name: Test Infra (Windows)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-infra-windows:
    name: test-infra-windows
    runs-on: windows-latest
    defaults:
      run:
        # windows-latest は PowerShell 7+ を既定搭載 (2023 以降)。justfile の windows-shell と整合。
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install just
        run: cargo install --locked just

      - name: just test-infra
        run: just test-infra
