name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: install just
        run: cargo install --locked just

      # justfile が CI / local / 手動の 3 経路で単一真実源 (DRY)。
      # workspace.lints.clippy で all="deny", pedantic="warn" が設定済みのため -D warnings は付けない。
      - name: just fmt-check
        run: just fmt-check

      - name: just clippy
        run: just clippy
